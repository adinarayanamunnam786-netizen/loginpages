<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catering Gallery</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <section class="gallery-section">

        <!-- Background Icons -->
        <i class="fa-solid fa-user-chef chef"></i>
        <i class="fa-solid fa-pizza-slice pizza-left"></i>
        <i class="fa-solid fa-pizza-slice pizza-right"></i>
        <i class="fa-solid fa-pizza-slice pizza-bottom"></i>

        <div class="gallery">

            <div class="diamond top-left">
                <img src="images/img1.jpg" alt="">
            </div>

            <div class="diamond top-right">
                <img src="images/img2.jpg" alt="">
            </div>

            <div class="diamond center">
                <img src="images/img3.jpg" alt="">
            </div>

            <div class="diamond bottom-left">
                <img src="images/img4.jpg" alt="">
            </div>

            <div class="diamond bottom-right">
                <img src="images/img5.jpg" alt="">
            </div>

        </div>

    </section>

</body>

</html>
